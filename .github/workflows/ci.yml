name: CI - Validación antes de deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar HTML
        run: |
          echo "=== Validando archivos HTML ==="
          for f in *.html; do
            echo "Revisando $f..."
            # Verificar que no tenga service_role key expuesta
            if grep -q "service_role" "$f"; then
              echo "❌ ERROR: $f contiene service_role key expuesta!"
              exit 1
            fi
            # Verificar que no tenga PIN hardcodeado
            if grep -qP 'var\s+PIN\s*=' "$f"; then
              echo "❌ ERROR: $f tiene PIN hardcodeado!"
              exit 1
            fi
            # Verificar que el HTML no esté vacío
            if [ ! -s "$f" ]; then
              echo "❌ ERROR: $f está vacío!"
              exit 1
            fi
            echo "✅ $f OK"
          done

      - name: Validar JSON del catálogo
        run: |
          if [ -f products.json ]; then
            echo "Validando products.json..."
            python3 -c "import json; d=json.load(open('products.json')); print(f'✅ products.json OK - {len(d)} productos')"
          fi

      - name: Verificar tamaño de archivos
        run: |
          echo "=== Tamaños de archivos ==="
          for f in *.html *.json; do
            [ -f "$f" ] && echo "$(du -h "$f" | cut -f1) $f"
          done
          # Alertar si index.html supera 500KB
          size=$(stat -f%z index.html 2>/dev/null || stat -c%s index.html 2>/dev/null)
          if [ "$size" -gt 512000 ]; then
            echo "⚠️ AVISO: index.html supera 500KB ($size bytes)"
          fi

      - name: Resumen
        run: |
          echo "==============================="
          echo "  ✅ Validación completada"
          echo "  Deploy a GitHub Pages: OK"
          echo "==============================="
