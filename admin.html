<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Administrador · Libros al Mayoreo</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0e6b5e;--teal-d:#0a5248;--ink:#202229;--gray:#6b7078;--line:#e8e8ea;--soft:#f4f5f6;--yellow:#f0a818;--blue:#1a73e8;--green:#25D366;--red:#e74c3c}
body{font-family:'Inter',sans-serif;background:var(--soft);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}

/* NAV */
nav{background:var(--teal);color:#fff;position:sticky;top:0;z-index:50}
.nav-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 20px}
.nav-in b{font-size:16px;font-weight:700}
.nav-in a{margin-left:auto;color:rgba(255,255,255,.85);font-size:12.5px;text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,.35);padding:7px 14px;border-radius:8px}
.nav-in a:hover{background:rgba(255,255,255,.1)}

/* LOGIN GATE */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-box{background:#fff;border-radius:14px;padding:36px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.gate-box h2{font-size:18px;margin-bottom:6px}
.gate-box p{font-size:13px;color:var(--gray);margin-bottom:20px}
.gate-box input{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px}
.gate-box input:focus{border-color:var(--teal)}
.gate-box button{width:100%;background:var(--teal);color:#fff;border:none;font-size:13.5px;font-weight:700;padding:13px;border-radius:9px}
.gate-err{color:var(--red);font-size:12px;margin-top:10px;display:none}

/* STATS */
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat{background:#fff;border-radius:12px;padding:22px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat b{font-size:28px;font-weight:800;display:block}
.stat span{font-size:11px;letter-spacing:2px;color:var(--gray);text-transform:uppercase;font-weight:600}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filters input{flex:1;min-width:200px;border:1.5px solid var(--line);border-radius:9px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;background:#fff}
.filters input:focus{border-color:var(--teal)}
.filters select{border:1.5px solid var(--line);border-radius:9px;padding:11px 14px;font-size:13px;font-family:inherit;outline:none;background:#fff;font-weight:600}

/* ORDER CARD */
.order{background:#fff;border-radius:12px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);position:relative}
.order-acts{position:absolute;top:16px;right:16px;display:flex;gap:8px}
.act{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .15s}
.act:hover{transform:scale(1.08)}
.act svg{width:18px;height:18px;fill:#fff}
.act.wa{background:var(--green)}
.act.del{background:var(--red)}
.o-rows{display:grid;grid-template-columns:140px 1fr;gap:5px 12px;font-size:13.5px;margin-bottom:6px;max-width:560px}
.o-rows b{color:var(--ink);font-weight:600}
.o-rows span{color:#3a3d45;word-break:break-word}
.o-total{display:flex;align-items:baseline;gap:14px;margin:12px 0 16px}
.o-total b{font-size:13.5px;font-weight:600}
.o-total span{font-size:24px;font-weight:800}
.o-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.o-btn{border:none;border-radius:6px;padding:13px 8px;font-size:12px;font-weight:700;letter-spacing:.3px;color:#fff;text-transform:uppercase;transition:opacity .15s}
.o-btn:hover{opacity:.9}
.o-btn.ver{background:var(--yellow)}
.o-btn.desp{background:var(--blue)}
.o-btn.entr{background:#b6b9bf}
.o-btn.desp.on{background:var(--blue);outline:3px solid rgba(26,115,232,.3)}
.o-btn.entr.on{background:#2e9e5b;outline:3px solid rgba(46,158,91,.3)}
.o-date{font-size:11.5px;color:var(--gray);text-align:right;margin-top:10px}
.o-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:12px;margin-bottom:12px}
.o-badge.nuevo{background:#fff3d6;color:#9a6c00}
.o-badge.despachado{background:#dcebff;color:#1a4f9e}
.o-badge.entregado{background:#dcf5e5;color:#1c7a43}

/* ITEMS DETAIL */
.o-items{display:none;background:var(--soft);border-radius:9px;padding:14px 16px;margin-bottom:14px}
.o-items.open{display:block}
.o-item{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
.o-item:last-child{border:none}
.o-item span:last-child{font-weight:700}
.o-items-tot{display:flex;justify-content:space-between;font-size:13.5px;font-weight:800;padding-top:8px}

.empty{background:#fff;border-radius:12px;padding:50px;text-align:center;color:var(--gray);font-size:14px}


/* DETAIL PAGE (estilo CatalogST) */
.detail{display:none;position:fixed;inset:0;background:var(--soft);z-index:200;flex-direction:column}
.detail.open{display:flex}
.det-nav{background:var(--teal);color:#fff;display:flex;align-items:center;gap:16px;padding:16px 20px;flex-shrink:0}
.det-nav button{background:none;border:none;color:#fff;display:flex;padding:4px}
.det-nav button svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.4}
.det-nav b{font-size:17px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.det-body{flex:1;overflow-y:auto;padding:20px;max-width:1000px;margin:0 auto;width:100%}
.det-item{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;gap:16px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.det-img{width:74px;height:100px;background:#e8e8ea;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px}
.det-img img{width:100%;height:100%;object-fit:cover}
.det-info b{font-size:14px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px;line-height:1.3}
.det-info div{font-size:13px;color:#3a3d45;line-height:1.6}
.det-foot{background:#fff;border-top:1px solid var(--line);padding:18px 20px;flex-shrink:0}
.det-foot-in{max-width:1000px;margin:0 auto}
.guia-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.guia-row b{font-size:13.5px;font-weight:700}
.guia-row input{border:1.5px solid var(--line);border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;min-width:200px}
.guia-row input:focus{border-color:var(--teal)}
.det-tot{font-size:14px;font-weight:700;margin-bottom:4px}
.det-tot.big{font-size:15px;margin-bottom:14px}
.fin-btn{width:100%;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:700;letter-spacing:1px;padding:15px;border-radius:6px;text-transform:uppercase}
.fin-btn:hover{background:var(--teal-d)}
.loading{text-align:center;padding:60px;color:var(--gray);font-size:13px}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h2>🔒 Panel de Administrador</h2>
    <p>Libros al Mayoreo</p>
    <input type="password" id="pin" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')checkPin()"/>
    <button onclick="checkPin()">Entrar</button>
    <div class="gate-err" id="gateErr">PIN incorrecto</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
  <nav>
    <div class="nav-in">
      <b>📊 Administrador · Libros al Mayoreo</b>
      <a href="index.html">Ver mi tienda</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="stats">
      <div class="stat"><b id="stVisitas">—</b><span>Visitas</span></div>
      <div class="stat"><b id="stPedidos">—</b><span>Pedidos</span></div>
      <div class="stat"><b id="stNuevos">—</b><span>Nuevos</span></div>
      <div class="stat"><b id="stVentas">—</b><span>Total Vendido</span></div>
    </div>

    <div class="filters">
      <input id="q" placeholder="Cliente / Código pedido" oninput="draw()"/>
      <select id="estado" onchange="draw()">
        <option value="">TODOS</option>
        <option value="nuevo">NUEVOS</option>
        <option value="despachado">DESPACHADOS</option>
        <option value="entregado">ENTREGADOS</option>
      </select>
    </div>

    <div id="list"><div class="loading">Cargando pedidos...</div></div>
  </div>
</div>

<!-- DETALLE DE PEDIDO -->
<div class="detail" id="detail">
  <div class="det-nav">
    <button onclick="closeDetail()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <b id="detTitle">VER PEDIDO</b>
  </div>
  <div class="det-body" id="detBody"></div>
  <div class="det-foot">
    <div class="det-foot-in">
      <div class="guia-row">
        <b>Código de Guía(Opcional):</b>
        <input id="detGuia" placeholder="Ingresa el código"/>
      </div>

      <div class="guia-row">
        <b>Costo de Envío ($):</b>
        <input id="detEnvio" type="number" placeholder="0"/>
      </div>
      <div class="det-tot">Subtotal: <span id="detSub"></span></div>
      <div class="det-tot big">Total: <span id="detTot"></span></div>
      <button class="fin-btn" id="detFin" onclick="finalizarDetail()">Finalizar</button>
      <button class="fin-btn" style="background:#fff;color:var(--teal);border:2px solid var(--teal);margin-top:10px" onclick="printNota(detId)">🧾 Imprimir Cotización</button>
    </div>
  </div>
</div>

<script>
// ════ CAMBIA TU PIN AQUI ════
var ADMIN_PIN = "1234";

var firebaseConfig = {
  apiKey:"AIzaSyB9z1uNv15dBE4KDMmtqAR024AUZPS2pWU",
  authDomain:"tienda-libros-593b2.firebaseapp.com",
  projectId:"tienda-libros-593b2",
  storageBucket:"tienda-libros-593b2.firebasestorage.app",
  messagingSenderId:"1099359659988",
  appId:"1:1099359659988:web:f12b6f9f3c998807bdd841"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var pedidosRef = db.collection("pedidos");
var statsRef = db.collection("stats").doc("contadores");

var PEDIDOS = [];
var openItems = {};

function checkPin(){
  if(document.getElementById("pin").value===ADMIN_PIN){
    sessionStorage.setItem("admin_ok","1");
    showPanel();
  } else {
    document.getElementById("gateErr").style.display="block";
  }
}

function showPanel(){
  document.getElementById("gate").style.display="none";
  document.getElementById("panel").style.display="block";
  startListeners();
}

if(sessionStorage.getItem("admin_ok")==="1") showPanel();

var started=false;
function startListeners(){
  if(started)return; started=true;
  statsRef.onSnapshot(function(doc){
    var d=doc.exists?doc.data():{};
    document.getElementById("stVisitas").textContent=(d.visitas||0).toLocaleString("es-MX");
  });
  pedidosRef.orderBy("creadoEn","desc").onSnapshot(function(snap){
    PEDIDOS=snap.docs.map(function(d){return {id:d.id,...d.data()};});
    document.getElementById("stPedidos").textContent=PEDIDOS.length;
    document.getElementById("stNuevos").textContent=PEDIDOS.filter(function(p){return p.estado==="nuevo";}).length;
    var tot=PEDIDOS.reduce(function(s,p){return s+(p.total||0);},0);
    document.getElementById("stVentas").textContent="$"+tot.toLocaleString("es-MX");
    draw();
  },function(err){
    document.getElementById("list").innerHTML='<div class="empty">Error de conexión: '+err.message+'</div>';
  });
}

function money(n){return "$"+(n||0).toLocaleString("es-MX");}

function fmtDate(ts){
  if(!ts||!ts.toDate)return "";
  var d=ts.toDate();
  return d.toLocaleDateString("es-MX")+" "+d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
}

function draw(){
  var q=document.getElementById("q").value.toLowerCase();
  var est=document.getElementById("estado").value;
  var list=PEDIDOS.filter(function(p){
    var matchQ=(p.cliente||"").toLowerCase().indexOf(q)>-1||(p.codigo||"").toLowerCase().indexOf(q)>-1;
    var matchE=!est||p.estado===est;
    return matchQ&&matchE;
  });
  if(!list.length){
    document.getElementById("list").innerHTML='<div class="empty">No hay pedidos'+(q||est?' con ese filtro':' todavía. Cuando un cliente haga un pedido en la tienda aparecerá aquí.')+'</div>';
    return;
  }
  document.getElementById("list").innerHTML=list.map(function(p){
    var tel=(p.telefono||"").replace(/[^0-9]/g,"");
    var waMsg=encodeURIComponent("Hola "+p.cliente+", te contactamos de Libros al Mayoreo sobre tu pedido "+p.codigo);
    var itemsHtml=(p.items||[]).map(function(it){
      return '<div class="o-item"><span>'+it.titulo+' × '+it.cantidad+'</span><span>'+money(it.subtotal)+'</span></div>';
    }).join("");
    return '<div class="order">'+
      '<div class="order-acts">'+
        (tel?'<a class="act wa" href="https://wa.me/52'+tel+'?text='+waMsg+'" target="_blank" title="WhatsApp"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 2a10 10 0 00-8.493 15.262L2 22l4.875-1.476A10 10 0 1012 2z"/></svg></a>':'')+
        '<button class="act" style="background:#5a6acf" onclick="printNota(\''+p.id+'\')" title="Cotización"><svg viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z" fill="none" stroke="#fff" stroke-width="2"/></svg></button>'+
        '<button class="act del" onclick="delPedido(\''+p.id+'\')" title="Eliminar"><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2zM4 5h16v2H4z"/></svg></button>'+
      '</div>'+
      '<span class="o-badge '+(p.estado||"nuevo")+'">'+(p.estado||"nuevo")+'</span>'+
      '<div class="o-rows">'+
        '<b>Código:</b><span>'+p.codigo+'</span>'+
        '<b>Cliente:</b><span>'+p.cliente+'</span>'+
        '<b>Zona de Entrega:</b><span>'+(p.zona||"—")+'</span>'+
        '<b>Teléfono:</b><span>'+(p.telefono||"—")+'</span>'+
        '<b>Email:</b><span>'+(p.email||"—")+'</span>'+
        '<b>Tipo de Entrega:</b><span>'+(p.tipoEntrega||"—")+'</span>'+
        '<b>Forma de pago:</b><span>'+(p.formaPago||"—")+'</span>'+
        (p.notas?'<b>Notas:</b><span>'+p.notas+'</span>':'')+
      '</div>'+
      '<div class="o-total"><b>Total:</b><span>'+money(p.total)+'</span><b style="color:var(--gray);font-weight:500">'+(p.piezas||0)+' piezas</b></div>'+

      '<div class="o-btns">'+
        '<button class="o-btn ver" onclick="openDetail(\''+p.id+'\',\'ver\')">1. Ver Pedido</button>'+
        '<button class="o-btn desp'+(p.estado==="despachado"?" on":"")+'" onclick="openDetail(\''+p.id+'\',\'despachado\')">2. Despachado</button>'+
        '<button class="o-btn entr'+(p.estado==="entregado"?" on":"")+'" onclick="openDetail(\''+p.id+'\',\'entregado\')">3. Entregado</button>'+
      '</div>'+
      '<div class="o-date">'+fmtDate(p.creadoEn)+'</div>'+
    '</div>';
  }).join("");
}

var detId=null, detMode=null;

function openDetail(id,mode){
  detId=id; detMode=mode;
  var p=PEDIDOS.find(function(x){return x.id===id;});
  if(!p)return;
  document.getElementById("detTitle").textContent =
    mode==="despachado" ? "DESPACHADO" : mode==="entregado" ? "ENTREGADO" : "VER PEDIDO";
  document.getElementById("detBody").innerHTML=(p.items||[]).map(function(it){
    var img=it.img?'<img referrerpolicy="no-referrer" src="'+it.img+'" onerror="this.outerHTML=\'📕\'"/>':'📕';
    return '<div class="det-item">'+
      '<div class="det-img">'+img+'</div>'+
      '<div class="det-info"><b>'+it.titulo+'</b>'+
      '<div>Cantidad '+it.cantidad+'<br>Precio '+money(it.precio)+'<br>Subtotal '+money(it.subtotal)+'</div></div>'+
    '</div>';
  }).join("");
  document.getElementById("detGuia").value=p.guia||"";
  document.getElementById("detEnvio").value=p.envio||"";
  document.getElementById("detEnvio").value=p.envio||"";
  document.getElementById("detSub").textContent=money(p.total);
  document.getElementById("detTot").textContent=money((p.total||0)+(p.envio||0));
  document.getElementById("detEnvio").oninput=function(){
    document.getElementById("detTot").textContent=money((p.total||0)+(parseFloat(this.value)||0));
  };
  document.getElementById("detFin").textContent =
    mode==="despachado" ? "Finalizar" : mode==="entregado" ? "Confirmar entrega" : "Guardar";
  document.getElementById("detail").classList.add("open");
}

function closeDetail(){document.getElementById("detail").classList.remove("open");}

function updTotal(){
  var p=PEDIDOS.find(function(x){return x.id===detId;});
  if(!p)return;
  var env=parseFloat(document.getElementById("detEnvio").value)||0;
  document.getElementById("detEnv").textContent=money(env);
  document.getElementById("detTot").textContent=money((p.total||0)+env);
}

function finalizarDetail(){
  if(!detId)return;
  var p=PEDIDOS.find(function(x){return x.id===detId;});
  var guia=document.getElementById("detGuia").value.trim();
  var envio=parseFloat(document.getElementById("detEnvio").value)||0;
  var upd={guia:guia,envio:envio};
  if(detMode==="despachado")upd.estado="despachado";
  if(detMode==="entregado")upd.estado="entregado";
  var EM_BOX="\ud83d\udce6", EM_BOOK="\ud83d\udcda", EM_CHECK="\u2705";
  pedidosRef.doc(detId).update(upd).then(function(){
    closeDetail();
    if(p&&p.telefono&&(detMode==="despachado"||detMode==="entregado")){
      var tel=(p.telefono||"").replace(/[^0-9]/g,"");
      var sub=p.total||0, tot=sub+envio, msg;
      if(detMode==="despachado"){
        msg="Hola "+p.cliente+
            "\n\u00a1Tu pedido *"+p.codigo+"* de Libros al Mayoreo ya est\u00e1 paquetado para env\u00edo! "+EM_BOX+" Te adjunto tu nota."+
            (guia?"\nC\u00f3digo de gu\u00eda para rastrearlo: "+guia:"")+
            "\n\nSub Total: $"+sub.toLocaleString("es-MX")+
            "\nEnvio: $"+envio.toLocaleString("es-MX")+
            "\n*Total: $"+tot.toLocaleString("es-MX")+"*"+
            "\n\n\u00a1Gracias por tu compra! "+EM_BOOK;
      } else {
        msg="Hola "+p.cliente+
            "\nTu pedido *"+p.codigo+"* fue marcado como *ENTREGADO* "+EM_CHECK+
            "\n\u00a1Gracias por comprar en Libros al Mayoreo! "+EM_BOOK;
      }
      window.open("https://wa.me/52"+tel+"?text="+encodeURIComponent(msg),"_blank");
      // Abrir tambien la nota para guardarla como PDF y adjuntarla en el chat
      if(detMode==="despachado") setTimeout(function(){ printNota(p.id); }, 800);
    }
  });
}

function printNota(id){
  var p=PEDIDOS.find(function(x){return x.id===id;});
  if(!p)return;
  var fecha=p.creadoEn&&p.creadoEn.toDate?p.creadoEn.toDate().toLocaleDateString("es-MX"):new Date().toLocaleDateString("es-MX");
  var rows=(p.items||[]).map(function(it){
    return '<tr>'+
      '<td>'+it.titulo.toUpperCase()+'</td>'+
      '<td style="text-align:center">'+(it.codigo||'—')+'</td>'+
      '<td style="text-align:right">'+it.precio+'</td>'+
      '<td style="text-align:center">'+it.cantidad+'</td>'+
      '<td style="text-align:center">0</td>'+

  '@media print{body{margin:16px}}'+
  '</style></head><body>'+
  '<div class="hd">'+
    '<div class="hd-l"><b>LIBROS AL MAYOREO</b>'+
